name: Clima CLI CI (Dockerized)

# Controla quando o workflow será executado
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

# Evita execuções redundantes para commits consecutivos na mesma branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Validação Estática (Roda rápido no host)
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar Dependências de Lint e Segurança
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Executar Ruff (Linter & Import Sorter)
        run: |
          ruff check .

      - name: Executar Ruff Format (Verificação de Formatação)
        run: |
          ruff format --check .

      - name: Análise de Segurança Estática (Bandit)
        run: |
          bandit -r . -ll -ii

  # Job 2: Build e Testes dentro do Container Docker
  docker-build-and-test:
    needs: lint-and-security
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      # Configura o driver de BuildKit para construções de container otimizadas e caching de camadas
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: clima-cli:latest
          outputs: type=docker,dest=/tmp/clima-cli-image.tar

      - name: Carregar Imagem Docker Construída
        run: |
          docker load --input /tmp/clima-cli-image.tar

      - name: Executar Testes Unitários dentro do Docker
        run: |
          # Sobrescreve o ENTRYPOINT padrão para executar a suíte de testes unitários no ambiente isolado do container
          docker run --entrypoint python clima-cli:latest -m unittest discover -s tests

      - name: Validar Execução e Interface da CLI no Container (Dry Run)
        run: |
          # Verifica se o container responde corretamente ao uso de argumentos
          # Se rodado sem argumentos, a CLI deve exibir a ajuda de uso e sair com código 1
          echo "Testando resposta da CLI sem argumentos (espera-se código de saída 1):"
          docker run --rm clima-cli:latest || [ $? -eq 1 ]

          # Faz uma chamada direta rápida em modo não-interativo que exibe o painel de clima e encerra imediatamente
          echo "Testando uma busca meteorológica real para 'Brasilia' (modo estático sem TTY):"
          docker run --rm clima-cli:latest "Brasilia"

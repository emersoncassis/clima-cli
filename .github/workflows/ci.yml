name: Clima CLI CI (Dockerized)

# Controla quando o workflow será executado
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

# Evita execuções redundantes para commits consecutivos na mesma branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job único: Build do container, lint/format/testes DENTRO do container, e execução da Action
  docker-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      # Configura o driver de BuildKit para construções de container otimizadas
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: clima-cli:latest
          outputs: type=docker,dest=/tmp/clima-cli-image.tar

      - name: Carregar Imagem Docker Construída
        run: |
          docker load --input /tmp/clima-cli-image.tar

      - name: Lint e Formatação dentro do Container
        run: |
          docker run --rm --entrypoint sh clima-cli:latest -c "
            pip install ruff bandit &&
            echo '=== Ruff Check ===' &&
            ruff check . &&
            echo '=== Ruff Format Check ===' &&
            ruff format --check . &&
            echo '=== Bandit Security ===' &&
            bandit -r . -ll -ii --exclude ./.git
          "

      - name: Executar Testes Unitários dentro do Container
        run: |
          docker run --rm --entrypoint python clima-cli:latest -m unittest discover -s tests

      - name: Validar CLI no Container (sem argumentos)
        run: |
          echo "Testando resposta da CLI sem argumentos (espera-se código de saída 1):"
          docker run --rm clima-cli:latest || [ $? -eq 1 ]

      - name: Executar Container Action Nativa
        uses: ./
        with:
          city: "Brasilia"
